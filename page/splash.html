<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMRP Helper - Загрузка</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #1a1a1a;
            --accent: #e63939;
            --text: #eeeeee;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            user-select: none;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, #1f1f1f 0%, #0a0a0a 70%);
            opacity: 0.8;
            z-index: -1;
        }

        .splash-container {
            width: min(90vw, 460px);
            text-align: center;
            animation: fadeInScale 0.6s ease-out forwards;
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.92) translateY(16px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .logo { margin-bottom: clamp(20px, 4vh, 34px); }
        .logo img { width: min(40vw, 170px); height: auto; filter: brightness(1.1); }

        /* ===== Иконка текущего этапа ===== */
        .stage-icon-wrap {
            width: clamp(56px, 10vh, 74px); height: clamp(56px, 10vh, 74px);
            margin: 0 auto 22px;
            border-radius: 50%;
            background: rgba(230, 57, 57, 0.1);
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .stage-icon-wrap::before {
            content: '';
            position: absolute; inset: -6px;
            border-radius: 50%;
            border: 2px solid rgba(230, 57, 57, 0.35);
            border-top-color: var(--accent);
            animation: spin 1.1s linear infinite;
        }
        body[data-stage="done"] .stage-icon-wrap::before { animation: none; border-color: rgba(46, 196, 182, 0.5); border-top-color: #2ec4b6; opacity: 0.5; }

        @keyframes spin { to { transform: rotate(360deg); } }

        .stage-icon { width: 45%; height: 45%; fill: var(--accent); display: none; }
        body[data-stage="network"] .stage-icon.icon-network,
        body[data-stage="server"] .stage-icon.icon-network { display: block; }
        body[data-stage="integrity"] .stage-icon.icon-integrity,
        body[data-stage="download"] .stage-icon.icon-integrity { display: block; }
        body[data-stage="core"] .stage-icon.icon-integrity { display: block; }
        body[data-stage="appdata"] .stage-icon.icon-appdata { display: block; }
        body[data-stage="laws"] .stage-icon.icon-laws,
        body[data-stage="laws-bg"] .stage-icon.icon-laws { display: block; }
        body[data-stage="done"] .stage-icon.icon-done { display: block; fill: #2ec4b6; }

        h1 { font-size: clamp(15px, 2vh, 18px); color: #ddd; font-weight: 600; margin-bottom: 6px; letter-spacing: 0.2px; }
        .file-line {
            font-size: clamp(11px, 1.3vh, 12px);
            color: #777;
            min-height: 16px;
            margin-bottom: clamp(14px, 3vh, 22px);
            opacity: 0;
            transition: opacity 0.25s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ===== Боссбар загрузки ===== */
        .bossbar-track {
            width: 100%;
            height: clamp(11px, 1.8vh, 14px);
            background: #111;
            border: 1px solid #2a2a2a;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }
        .bossbar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent) 0%, #ff4d4d 100%);
            box-shadow: 0 0 12px rgba(230, 57, 57, 0.55);
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            /* Плавный "глайд"-переход ширины при каждом обновлении прогресса */
            transition: width 0.9s cubic-bezier(0.16, 1, 0.3, 1);
        }
        body[data-stage="done"] .bossbar-fill {
            background: linear-gradient(90deg, #2ec4b6 0%, #57e0d2 100%);
            box-shadow: 0 0 12px rgba(46, 196, 182, 0.5);
        }
        /* Скользящий блик поверх заливки — тот самый "glide"-эффект движения */
        .bossbar-fill::after {
            content: '';
            position: absolute;
            top: 0; bottom: 0; left: -40%;
            width: 40%;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.55) 50%, transparent 100%);
            animation: glide 1.4s ease-in-out infinite;
        }
        @keyframes glide {
            0%   { left: -40%; }
            100% { left: 120%; }
        }

        .bossbar-footer {
            display: flex;
            justify-content: space-between;
            margin-top: clamp(8px, 1.5vh, 12px);
            font-size: clamp(11px, 1.4vh, 13px);
            color: #999;
            font-weight: 600;
            gap: 8px;
            flex-wrap: wrap;
        }
        #progressPercent { color: var(--accent); }
        body[data-stage="done"] #progressPercent { color: #2ec4b6; }
    </style>
    <link rel="stylesheet" href="rmrp-controls.css">
</head>
<body data-stage="network">
    <div class="splash-container">
        <div class="logo">
            <img src="../img/logo.svg" alt="RMRP Helper">
        </div>

        <div class="stage-icon-wrap">
            <!-- Проверка интернет-соединения -->
            <svg class="stage-icon icon-network" viewBox="0 0 24 24"><path d="M12 21.5 3.5 13c1.9-1.9 4.4-3 7-3s5.6 1.1 7.5 3zM12 3a15.9 15.9 0 0 1 10.6 4L21 8.7A13.4 13.4 0 0 0 12 5.4 13.4 13.4 0 0 0 3 8.7L1.4 7A15.9 15.9 0 0 1 12 3zm0 5.4c2.3 0 4.4.8 6.1 2.2l-1.6 1.6a6.5 6.5 0 0 0-9 0L6 10.6A9.3 9.3 0 0 1 12 8.4z"/></svg>
            <!-- Проверка / загрузка с GitHub -->
            <svg class="stage-icon icon-integrity" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14-4-4 1.41-1.41L12 14.17l6.59-6.59L20 9l-8 8z"/></svg>
            <!-- Проверка appdata -->
            <svg class="stage-icon icon-appdata" viewBox="0 0 24 24"><path d="M12 2C7.58 2 4 3.34 4 5v14c0 1.66 3.58 3 8 3s8-1.34 8-3V5c0-1.66-3.58-3-8-3zm0 2c3.87 0 6 1.14 6 1.5S15.87 7 12 7 6 5.86 6 5.5 8.13 4 12 4zm-6 4.09C7.4 8.7 9.5 9 12 9s4.6-.3 6-.91v3.4c0 .36-2.13 1.5-6 1.5s-6-1.14-6-1.5zm0 5.02c1.4.61 3.5.9 6 .9s4.6-.29 6-.9v3.4c0 .36-2.13 1.5-6 1.5s-6-1.14-6-1.5z"/></svg>
            <!-- Загрузка базы законодательства -->
            <svg class="stage-icon icon-laws" viewBox="0 0 24 24"><path d="M12 2 3 6v2h1v9a2 2 0 0 0 2 2h4v-2H6V8h6V6H4.24L12 4.4 19.76 6H18v2h-6v2h6v9h-4v2h4a2 2 0 0 0 2-2V8h1V6z"/><path d="M14 14h7v2h-7zM14 18h7v2h-7z"/></svg>
            <!-- Готово -->
            <svg class="stage-icon icon-done" viewBox="0 0 24 24"><path d="M9 16.2 4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4z"/></svg>
        </div>

        <h1 id="progressLabel">Проверка подключения к интернету…</h1>
        <div class="file-line" id="progressFile"></div>

        <div class="bossbar-track">
            <div class="bossbar-fill" id="progressFill"></div>
        </div>
        <div class="bossbar-footer">
            <span>RMRP Helper</span>
            <span id="progressPercent">0%</span>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const body = document.body;
            const fill = document.getElementById('progressFill');
            const percentEl = document.getElementById('progressPercent');
            const labelEl = document.getElementById('progressLabel');
            const fileEl = document.getElementById('progressFile');

            function update(data) {
                if (!data) return;
                body.setAttribute('data-stage', data.stage || 'appdata');

                const percent = Math.max(0, Math.min(100, Math.round(data.percent || 0)));
                fill.style.width = percent + '%';
                percentEl.textContent = percent + '%';

                if (data.label) labelEl.textContent = data.label;

                const showFile = data.fileName && ['laws', 'integrity', 'download', 'core'].includes(data.stage);
                if (showFile) {
                    fileEl.style.opacity = '1';
                    fileEl.textContent = (data.current && data.total)
                        ? `${data.fileName} (${data.current}/${data.total})`
                        : data.fileName;
                } else {
                    fileEl.style.opacity = '0';
                    fileEl.textContent = '';
                }
            }

            if (window.electron && window.electron.onStartupProgress) {
                window.electron.onStartupProgress(update);
            } else {
                // Если мост недоступен (не должно происходить в норме) — не блокируем интерфейс молча
                labelEl.textContent = 'Загрузка…';
            }
        });
    </script>
</body>
</html>
